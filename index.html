<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo" class="logo">
    <button class="signin">Sign In</button>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Unlimited movies, TV shows, and more.</h1>
    <p>Watch anywhere. Cancel anytime.</p>
    <input type="email" placeholder="Email address">
    <button>Get Started</button>
  </div>

  <!-- Movie Rows -->
  <div class="row">
    <h2>Popular on Netflix</h2>
    <div class="movies">
      <img src="https://via.placeholder.com/150x200" alt="Movie 1">
      <img src="https://via.placeholder.com/150x200" alt="Movie 2">
      <img src="https://via.placeholder.com/150x200" alt="Movie 3">
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>Netflix Clone Project - Task 4</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
